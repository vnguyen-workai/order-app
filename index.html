<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Order Board</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
  :root {
    /* cool neutral base + one accent (cobalt) — not the warm brass/espresso default */
    --bg: #121316;
    --panel: #191b1f;
    --panel-2: #1e2126;
    --line: #2b2e35;
    --ink: #eef0f3;
    --ink-dim: #8b909b;
    --accent: #4f7fe0;
    --accent-ink: #f4f7ff;
    --amber: #d99a3d;
    --amber-dim: #3a2f1c;
    --green: #5fae6b;
    --green-dim: #1e3020;
    --red: #dc5b4d;
    --red-dim: #3a2220;
    --radius: 12px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
  }
  header {
    position: sticky; top: 0; z-index: 5;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    padding: 16px 20px;
    display: flex; align-items: center; justify-content: space-between;
  }
  header h1 {
    font-size: 19px; margin: 0; font-weight: 700;
  }
  header h1 .kicker {
    display: block; font-size: 13px; font-weight: 400;
    color: var(--ink-dim); margin-top: 2px;
  }
  .add-btn {
    background: var(--accent); color: var(--accent-ink);
    border: none; border-radius: var(--radius);
    font-size: 15px; font-weight: 700;
    padding: 12px 18px; cursor: pointer;
    transition: transform .1s ease;
  }
  .add-btn:active { transform: scale(.97); }

  .menu-btn {
    background: transparent; color: var(--ink); border: 1px solid var(--line);
    border-radius: var(--radius); font-size: 18px; line-height: 1;
    padding: 12px 15px; cursor: pointer; margin-right: 10px;
  }
  .menu-btn:active { transform: scale(.95); }

  .menu-panel {
    display: none; position: absolute; top: 64px; left: 20px; z-index: 8;
    background: var(--panel-2); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 4px; min-width: 190px;
  }
  .menu-panel.show { display: block; }
  .menu-panel button {
    display: block; width: 100%; text-align: left; background: transparent; border: none;
    color: var(--ink); font-size: 15px; font-weight: 600; padding: 12px 14px; border-radius: 8px; cursor: pointer;
  }
  .menu-panel button:active { background: var(--panel); }

  .history-bar { display: flex; align-items: center; gap: 10px; padding: 16px 20px 0; }
  .back-btn {
    background: transparent; border: 1px solid var(--line); color: var(--ink);
    border-radius: var(--radius); padding: 10px 14px; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .back-btn:active { transform: scale(.96); }
  .history-bar h2 { margin: 0; font-size: 16px; font-weight: 700; }

  .chip-row { display: flex; gap: 6px; padding: 14px 20px 0; flex-wrap: wrap; }
  .chip {
    background: transparent; color: var(--ink-dim); border: 1px solid var(--line);
    border-radius: 999px; padding: 8px 15px; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .chip.active { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }

  .date-wrap { padding: 12px 20px 0; }
  .date-wrap input[type=date] {
    width: 100%; font-size: 15px; padding: 11px 14px; border-radius: var(--radius);
    border: 1px solid var(--line); background: var(--panel-2); color: var(--ink); font-family: inherit;
  }
  .date-wrap input[type=date]:focus { outline: none; border-color: var(--accent); }

  .tabs { display: flex; gap: 6px; padding: 16px 20px 0; flex-wrap: wrap; }
  .tab {
    background: transparent; color: var(--ink-dim); border: 1px solid var(--line);
    border-radius: 999px;
    padding: 9px 18px; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .tab.active { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }

  .search-wrap { padding: 14px 20px 0; }
  .search-wrap input {
    width: 100%; font-size: 16px; padding: 12px 16px; border-radius: var(--radius);
    border: 1px solid var(--line); background: var(--panel-2); color: var(--ink);
    font-family: inherit;
  }
  .search-wrap input:focus { outline: none; border-color: var(--accent); }

  .date-heading {
    grid-column: 1 / -1;
    font-size: 13px; font-weight: 700;
    color: var(--ink-dim); padding: 10px 2px 0; margin-top: 6px;
    border-top: 1px solid var(--line);
  }
  .date-heading:first-child { border-top: none; margin-top: 0; padding-top: 0; }

  #orders {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px; padding: 20px;
  }
  .card {
    background: var(--panel);
    border-radius: var(--radius);
    padding: 18px 18px 18px 20px;
    border: 1px solid var(--line);
    border-left: 3px solid var(--line);
  }
  .card.status-new { border-left-color: var(--accent); }
  .card.status-in_progress { border-left-color: var(--amber); }
  .card.status-done { border-left-color: var(--green); opacity: .65; }

  .card .top { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; margin-bottom: 10px; }
  .card .name { font-size: 18px; font-weight: 700; word-break: break-word; }
  .card .time { font-size: 12px; color: var(--ink-dim); white-space: nowrap; }
  .card .items { font-size: 15px; color: var(--ink); white-space: pre-wrap; margin-bottom: 8px; line-height: 1.5; }
  .card .notes {
    font-size: 13px; color: var(--ink); margin-bottom: 14px; white-space: pre-wrap;
    background: var(--panel-2); border-left: 2px solid var(--amber); padding: 8px 10px;
  }
  .badge {
    display: inline-block;
    font-size: 12px; font-weight: 700;
    padding: 4px 10px; border-radius: 999px; margin-bottom: 12px;
  }
  .badge.new { background: rgba(79,127,224,.16); color: var(--accent); }
  .badge.in_progress { background: var(--amber-dim); color: var(--amber); }
  .badge.done { background: var(--green-dim); color: var(--green); }

  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn {
    border: none; border-radius: var(--radius); font-size: 14px; font-weight: 700;
    padding: 12px 14px; cursor: pointer; flex: 1; min-width: 90px; color: #fff;
    transition: transform .1s ease;
  }
  .btn:active { transform: scale(.97); }
  .btn.blue  { background: var(--accent); color: var(--accent-ink); }
  .btn.green { background: var(--green); color: #0d2410; }
  .btn.gray  { background: var(--panel-2); color: var(--ink); border: 1px solid var(--line); }
  .btn.red   { background: var(--red); }

  .empty { text-align: center; color: var(--ink-dim); padding: 70px 20px; font-size: 16px; line-height: 1.6; }
  .empty b { color: var(--ink); }

  /* modal */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.6);
    display: none; align-items: center; justify-content: center; z-index: 10; padding: 16px;
  }
  .overlay.show { display: flex; }
  .modal {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 16px; padding: 24px; width: 100%; max-width: 420px; max-height: 92vh; overflow-y: auto;
  }
  .modal h2 { margin: 0 0 20px; font-size: 19px; font-weight: 700; text-align: center; }
  .modal label { font-size: 13px; color: var(--ink-dim); display: block; margin-bottom: 8px; font-weight: 600; }
  .modal input[type=text], .modal input[type=password], .modal textarea {
    width: 100%; font-size: 16px; padding: 13px 14px; border-radius: var(--radius);
    border: 1px solid var(--line);
    margin-bottom: 16px; background: var(--panel-2); color: var(--ink); font-family: inherit;
  }
  .modal input:focus, .modal textarea:focus { outline: none; border-color: var(--accent); }
  .modal textarea { min-height: 90px; resize: vertical; }
  .modal input[type=datetime-local] {
    width: 100%; font-size: 16px; padding: 13px 14px; border-radius: var(--radius);
    border: 1px solid var(--line); margin-bottom: 16px; background: var(--panel-2); color: var(--ink); font-family: inherit;
  }
  .checkbox-row {
    display: flex; align-items: center; gap: 10px; font-size: 14px; color: var(--ink);
    font-weight: 600; margin-bottom: 16px; cursor: pointer;
  }
  .checkbox-row input { width: 18px; height: 18px; margin: 0; }
  .modal .actions { display: flex; gap: 12px; margin-top: 6px; }
  .upcoming-tag {
    display: inline-block; font-size: 12px; font-weight: 700; color: var(--accent);
    background: rgba(79,127,224,.14); padding: 4px 10px; border-radius: 999px; margin-bottom: 12px;
  }
  .gate .modal { text-align: center; }
  .err { color: var(--red); font-size: 14px; margin: -10px 0 14px; display: none; }

  /* ---------- New Order screen (menu + cart) ---------- */
  .order-screen {
    position: fixed; inset: 0; z-index: 12;
    background: var(--bg);
    display: flex; flex-direction: column;
  }
  .order-header {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 20px; border-bottom: 1px solid var(--line); background: var(--panel);
    flex-shrink: 0;
  }
  .order-header h2 { margin: 0; font-size: 16px; font-weight: 700; }

  .order-body { flex: 1; min-height: 0; display: flex; overflow: hidden; }

  .menu-pane { flex: 1; overflow-y: auto; padding: 16px; }
  .menu-category {
    font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px;
    color: var(--ink-dim); margin: 18px 0 8px;
  }
  .menu-category:first-child { margin-top: 0; }
  .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; }
  .menu-item {
    position: relative; background: var(--panel); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 14px 10px; color: var(--ink);
    font-size: 14px; font-weight: 600; text-align: center; cursor: pointer;
  }
  .menu-item:active { transform: scale(.96); }
  .menu-item.picked { border-color: var(--accent); background: rgba(79,127,224,.12); }
  .menu-item .qty-badge {
    position: absolute; top: -8px; right: -8px;
    background: var(--accent); color: var(--accent-ink);
    font-size: 12px; font-weight: 800; min-width: 22px; height: 22px; border-radius: 999px;
    display: flex; align-items: center; justify-content: center; padding: 0 4px;
  }

  .cart-pane {
    width: 150px; flex-shrink: 0; border-left: 1px solid var(--line);
    background: var(--panel); overflow-y: auto; padding: 14px 10px;
    display: flex; flex-direction: column;
  }
  .cart-title { font-size: 13px; font-weight: 700; color: var(--ink-dim); text-transform: uppercase; margin-bottom: 10px; }
  .cart-line {
    display: flex; justify-content: space-between; align-items: center; gap: 6px;
    background: var(--panel-2); border-radius: 8px; padding: 8px 8px; margin-bottom: 6px;
    font-size: 13px; cursor: pointer;
  }
  .cart-line .cart-name { flex: 1; word-break: break-word; }
  .cart-line .cart-qty { font-weight: 800; color: var(--accent); }
  .cart-empty { font-size: 12px; color: var(--ink-dim); line-height: 1.5; }
  .custom-add { margin-top: auto; padding-top: 10px; display: flex; flex-direction: column; gap: 6px; }
  .custom-add input {
    width: 100%; font-size: 13px; padding: 8px 10px; border-radius: 8px;
    border: 1px solid var(--line); background: var(--bg); color: var(--ink); font-family: inherit;
  }
  .custom-add .btn { padding: 8px; font-size: 13px; }

  .order-footer {
    flex-shrink: 0; border-top: 1px solid var(--line); background: var(--panel);
    padding: 14px 20px; max-height: 46vh; overflow-y: auto;
  }
  .order-footer input[type=text], .order-footer textarea, .order-footer input[type=datetime-local] {
    width: 100%; font-size: 15px; padding: 12px 14px; border-radius: var(--radius);
    border: 1px solid var(--line); margin-bottom: 12px; background: var(--panel-2); color: var(--ink); font-family: inherit;
  }
  .order-footer input:focus, .order-footer textarea:focus { outline: none; border-color: var(--accent); }
  .order-footer textarea { min-height: 60px; resize: vertical; }
  .order-footer .actions { display: flex; gap: 12px; }
  .order-footer .checkbox-row { margin-bottom: 12px; }

  /* ---------- menu settings ---------- */
  .settings-body { flex: 1; min-height: 0; overflow-y: auto; padding: 16px 20px; }
  .settings-section {
    background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 14px 16px; margin-bottom: 14px;
  }
  .settings-section .section-head {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;
  }
  .settings-section .section-head h3 { margin: 0; font-size: 15px; font-weight: 700; }
  .settings-section .section-head button {
    background: transparent; border: none; color: var(--red); font-size: 13px; font-weight: 700; cursor: pointer; padding: 4px 6px;
  }
  .settings-item {
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    padding: 9px 0; border-top: 1px solid var(--line); font-size: 14px;
  }
  .settings-item:first-of-type { border-top: none; }
  .settings-item button {
    background: transparent; border: none; color: var(--red); font-size: 16px; font-weight: 800; cursor: pointer; padding: 2px 8px;
  }
  .settings-add-item { display: flex; gap: 8px; margin-top: 10px; }
  .settings-add-item input {
    flex: 1; font-size: 14px; padding: 9px 10px; border-radius: 8px;
    border: 1px solid var(--line); background: var(--panel-2); color: var(--ink); font-family: inherit;
  }
  .settings-add-item button {
    background: var(--accent); color: var(--accent-ink); border: none; border-radius: 8px;
    padding: 9px 14px; font-size: 13px; font-weight: 700; cursor: pointer;
  }
</style>
</head>
<body>

<!-- Password gate -->
<div class="overlay gate show" id="gate">
  <div class="modal">
    <h2>Staff Login</h2>
    <input type="password" id="pw" placeholder="Enter shared password" autocomplete="off">
    <div class="err" id="pwErr">Wrong password, try again.</div>
    <button class="btn green" style="width:100%" onclick="tryLogin()">Enter</button>
  </div>
</div>

<div id="app" style="display:none">
  <header>
    <div style="display:flex; align-items:center;">
      <button class="menu-btn" onclick="toggleMenu()">☰</button>
      <h1>Order Board<span class="kicker">Viet-Cajun Kitchen</span></h1>
    </div>
    <button class="add-btn" onclick="openOrderScreen()">+ New Order</button>
  </header>

  <div class="menu-panel" id="menuPanel">
    <button onclick="openHistory()">Order History</button>
    <button onclick="openMenuSettings()">Menu Settings</button>
  </div>

  <div id="boardBar" class="tabs">
    <button class="tab active" data-f="active" onclick="setFilter('active')">Active</button>
    <button class="tab" data-f="upcoming" onclick="setFilter('upcoming')">Upcoming</button>
    <button class="tab" data-f="done" onclick="setFilter('done')">Done</button>
  </div>

  <div id="historyBar" style="display:none">
    <div class="history-bar">
      <button class="back-btn" onclick="closeHistory()">← Back</button>
      <h2>Order History</h2>
    </div>
    <div class="chip-row">
      <button class="chip active" data-r="today" onclick="setHistoryRange('today')">Today</button>
      <button class="chip" data-r="yesterday" onclick="setHistoryRange('yesterday')">Yesterday</button>
      <button class="chip" data-r="7days" onclick="setHistoryRange('7days')">Last 7 Days</button>
      <button class="chip" data-r="all" onclick="setHistoryRange('all')">All</button>
    </div>
    <div class="date-wrap">
      <input type="date" id="historyDate" onchange="setHistoryDate(this.value)">
    </div>
    <div class="search-wrap">
      <input type="text" id="searchBox" placeholder="Search by customer name..." oninput="onSearch()">
    </div>
  </div>

  <div id="orders"></div>
  <div class="empty" id="empty">No orders yet.<br>Tap <b>+ New Order</b> to add one.</div>
</div>

<!-- New Order screen: menu buttons + cart -->
<div class="order-screen" id="orderScreen" style="display:none">
  <div class="order-header">
    <button class="back-btn" onclick="closeOrderScreen()">← Cancel</button>
    <h2>New Order</h2>
  </div>

  <div class="order-body">
    <div class="menu-pane" id="menuPane"></div>
    <div class="cart-pane" id="cartPane">
      <div class="cart-title">Order</div>
      <div id="cartList"></div>
      <div class="cart-empty" id="cartEmpty">Tap items to add them</div>
      <div class="custom-add">
        <input type="text" id="customItemInput" placeholder="Other item...">
        <button class="btn gray" onclick="addCustomItem()">Add</button>
      </div>
    </div>
  </div>

  <div class="order-footer">
    <input type="text" id="custName" placeholder="Customer name" autocomplete="off">
    <textarea id="custNotes" placeholder="Notes (optional): no spice, extra sauce..."></textarea>
    <label class="checkbox-row">
      <input type="checkbox" id="scheduleToggle" onchange="onScheduleToggle()">
      Schedule for later (not right now)
    </label>
    <div id="scheduleField" style="display:none">
      <label>Order for</label>
      <input type="datetime-local" id="custWhen">
    </div>
    <div class="actions">
      <button class="btn gray" onclick="closeOrderScreen()">Cancel</button>
      <button class="btn green" onclick="addOrder()">Save Order</button>
    </div>
  </div>
</div>

<!-- Menu Settings screen -->
<div class="order-screen" id="settingsScreen" style="display:none">
  <div class="order-header">
    <button class="back-btn" onclick="closeMenuSettings()">← Cancel</button>
    <h2>Menu Settings</h2>
  </div>
  <div class="settings-body" id="settingsBody"></div>
  <div class="order-footer">
    <input type="text" id="newSectionInput" placeholder="New section name (e.g. Desserts)">
    <input type="text" id="newSectionFirstItem" placeholder="First item in this section (e.g. Che Ba Mau)">
    <div class="actions">
      <button class="btn green" style="flex:none; width:100%" onclick="addSection()">+ Add Section</button>
    </div>
  </div>
</div>

<script>
/* ================== CONFIG — fill these in from your Supabase project ================== */
const SUPABASE_URL = 'https://cfoqlxzhtfyahhszcinl.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_mONNhGPjavlxtacViUR0PQ_t1IYJyg3';
const SHARED_PASSWORD = '1234'; // set your staff password here
const SETTINGS_PIN = '9999'; // separate PIN to edit the menu (keep employees from changing it by accident)
/* ========================================================================================= */

const $ = id => document.getElementById(id);
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let orders = [];
let filter = 'active';
let search = '';
let view = 'board';         // 'board' | 'history'
let historyRange = 'today'; // 'today' | 'yesterday' | '7days' | 'all' | 'custom'
let historyDate = null;     // 'YYYY-MM-DD' when historyRange === 'custom'

/* ---------- login gate ---------- */
function tryLogin() {
  if ($('pw').value === SHARED_PASSWORD) {
    sessionStorage.setItem('loggedIn', '1');
    $('gate').classList.remove('show');
    $('app').style.display = 'block';
    boot();
  } else {
    $('pwErr').style.display = 'block';
  }
}
$('pw').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

/* ---------- data ---------- */
async function loadOrders() {
  const { data, error } = await sb.from('orders').select('*').order('created_at', { ascending: false });
  if (error) { console.error(error); return; }
  orders = data;
  render();
}

async function addOrder() {
  const customer_name = $('custName').value.trim() || 'Customer';
  const items = cartToItemsString();
  const notes = $('custNotes').value.trim();
  if (!items) { alert('Tap at least one menu item, or add a custom one.'); return; }
  let order_for = null;
  if ($('scheduleToggle').checked) {
    const when = $('custWhen').value;
    if (!when) { alert('Pick a date and time for this order, or uncheck "Schedule for later."'); return; }
    order_for = new Date(when).toISOString();
  }
  const { error } = await sb.from('orders').insert([{ customer_name, items, notes, status: 'new', order_for }]);
  if (error) { alert('Could not save order: ' + error.message); return; }
  closeOrderScreen();
}

async function setStatus(id, status) {
  const { error } = await sb.from('orders').update({ status }).eq('id', id);
  if (error) alert('Could not update order: ' + error.message);
}

async function del(id) {
  if (!confirm('Delete this order?')) return;
  const { error } = await sb.from('orders').delete().eq('id', id);
  if (error) alert('Could not delete order: ' + error.message);
}

/* ---------- schedule toggle ---------- */
function onScheduleToggle() {
  $('scheduleField').style.display = $('scheduleToggle').checked ? 'block' : 'none';
}

/* ---------- food menu + cart ---------- */
let menuItems = []; // raw rows from Supabase: {id, category, name, sort_order}
let cart = {}; // { itemName: qty }

async function loadMenu() {
  const { data, error } = await sb.from('menu_items').select('*').order('category').order('sort_order');
  if (error) { console.error(error); return; }
  menuItems = data;
}

function menuByCategory() {
  const map = new Map();
  menuItems.forEach(it => {
    if (!map.has(it.category)) map.set(it.category, []);
    map.get(it.category).push(it);
  });
  return map;
}

function openOrderScreen() {
  cart = {};
  $('custName').value = ''; $('custNotes').value = ''; $('customItemInput').value = '';
  $('scheduleToggle').checked = false; $('custWhen').value = ''; $('scheduleField').style.display = 'none';
  renderMenuPane();
  renderCart();
  $('orderScreen').style.display = 'flex';
}
function closeOrderScreen() { $('orderScreen').style.display = 'none'; }

function renderMenuPane() {
  const pane = $('menuPane');
  pane.innerHTML = '';
  if (!menuItems.length) { pane.innerHTML = '<div class="cart-empty">No menu items yet. Add some in Menu Settings.</div>'; return; }
  menuByCategory().forEach((items, category) => {
    const heading = document.createElement('div');
    heading.className = 'menu-category';
    heading.textContent = category;
    pane.appendChild(heading);

    const grid = document.createElement('div');
    grid.className = 'menu-grid';
    items.forEach(it => {
      const btn = document.createElement('button');
      btn.className = 'menu-item';
      btn.dataset.name = it.name;
      btn.onclick = () => addToCart(it.name);
      btn.innerHTML = esc(it.name);
      grid.appendChild(btn);
    });
    pane.appendChild(grid);
  });
}

function addToCart(name) {
  cart[name] = (cart[name] || 0) + 1;
  renderCart();
  updateMenuBadges();
}
function decrementCart(name) {
  if (!cart[name]) return;
  cart[name] -= 1;
  if (cart[name] <= 0) delete cart[name];
  renderCart();
  updateMenuBadges();
}
function addCustomItem() {
  const name = $('customItemInput').value.trim();
  if (!name) return;
  addToCart(name);
  $('customItemInput').value = '';
}

function updateMenuBadges() {
  $('menuPane').querySelectorAll('.menu-item').forEach(btn => {
    const qty = cart[btn.dataset.name] || 0;
    btn.classList.toggle('picked', qty > 0);
    const existing = btn.querySelector('.qty-badge');
    if (qty > 0) {
      if (existing) existing.textContent = qty;
      else {
        const b = document.createElement('span');
        b.className = 'qty-badge';
        b.textContent = qty;
        btn.appendChild(b);
      }
    } else if (existing) existing.remove();
  });
}

function renderCart() {
  const list = $('cartList');
  const names = Object.keys(cart);
  $('cartEmpty').style.display = names.length ? 'none' : 'block';
  list.innerHTML = '';
  names.forEach(name => {
    const line = document.createElement('div');
    line.className = 'cart-line';
    line.onclick = () => decrementCart(name);
    line.innerHTML = `<span class="cart-name">${esc(name)}</span><span class="cart-qty">x${cart[name]}</span>`;
    list.appendChild(line);
  });
}

function cartToItemsString() {
  return Object.keys(cart).map(name => `${cart[name]}x ${name}`).join(', ');
}

/* ---------- menu settings ---------- */
async function openMenuSettings() {
  $('menuPanel').classList.remove('show');
  const pin = prompt('Enter the Menu Settings PIN:');
  if (pin === null) return;
  if (pin !== SETTINGS_PIN) { alert('Wrong PIN.'); return; }
  await loadMenu();
  renderSettingsBody();
  $('newSectionInput').value = ''; $('newSectionFirstItem').value = '';
  $('settingsScreen').style.display = 'flex';
}
function closeMenuSettings() { $('settingsScreen').style.display = 'none'; }

function renderSettingsBody() {
  const body = $('settingsBody');
  body.innerHTML = '';
  if (!menuItems.length) {
    body.innerHTML = '<div class="cart-empty">No sections yet. Add one below.</div>';
    return;
  }
  menuByCategory().forEach((items, category) => {
    const section = document.createElement('div');
    section.className = 'settings-section';

    const head = document.createElement('div');
    head.className = 'section-head';
    head.innerHTML = `<h3>${esc(category)}</h3>`;
    const delSectionBtn = document.createElement('button');
    delSectionBtn.textContent = 'Delete section';
    delSectionBtn.onclick = () => deleteSection(category);
    head.appendChild(delSectionBtn);
    section.appendChild(head);

    items.forEach(it => {
      const row = document.createElement('div');
      row.className = 'settings-item';
      row.innerHTML = `<span>${esc(it.name)}</span>`;
      const delBtn = document.createElement('button');
      delBtn.textContent = '×';
      delBtn.onclick = () => deleteMenuItem(it.id);
      row.appendChild(delBtn);
      section.appendChild(row);
    });

    const addRow = document.createElement('div');
    addRow.className = 'settings-add-item';
    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = 'New item name';
    const addBtn = document.createElement('button');
    addBtn.textContent = 'Add';
    addBtn.onclick = () => addMenuItem(category, input.value, items.length);
    addRow.appendChild(input); addRow.appendChild(addBtn);
    section.appendChild(addRow);

    body.appendChild(section);
  });
}

async function addMenuItem(category, name, sortOrder) {
  name = name.trim();
  if (!name) return;
  const { error } = await sb.from('menu_items').insert([{ category, name, sort_order: sortOrder }]);
  if (error) { alert('Could not add item: ' + error.message); return; }
  await loadMenu();
  renderSettingsBody();
}

async function deleteMenuItem(id) {
  if (!confirm('Delete this item?')) return;
  const { error } = await sb.from('menu_items').delete().eq('id', id);
  if (error) { alert('Could not delete item: ' + error.message); return; }
  await loadMenu();
  renderSettingsBody();
}

async function deleteSection(category) {
  if (!confirm(`Delete the whole "${category}" section and all its items?`)) return;
  const { error } = await sb.from('menu_items').delete().eq('category', category);
  if (error) { alert('Could not delete section: ' + error.message); return; }
  await loadMenu();
  renderSettingsBody();
}

async function addSection() {
  const category = $('newSectionInput').value.trim();
  const firstItem = $('newSectionFirstItem').value.trim();
  if (!category || !firstItem) { alert('Enter both a section name and its first item.'); return; }
  const { error } = await sb.from('menu_items').insert([{ category, name: firstItem, sort_order: 0 }]);
  if (error) { alert('Could not add section: ' + error.message); return; }
  $('newSectionInput').value = ''; $('newSectionFirstItem').value = '';
  await loadMenu();
  renderSettingsBody();
}

/* ---------- filter (board tabs) ---------- */
function setFilter(f) {
  filter = f;
  document.querySelectorAll('#boardBar .tab').forEach(t => t.classList.toggle('active', t.dataset.f === f));
  render();
}
function onSearch() {
  search = $('searchBox').value.trim().toLowerCase();
  render();
}

/* ---------- menu ---------- */
function toggleMenu() { $('menuPanel').classList.toggle('show'); }
document.addEventListener('click', e => {
  if (!$('menuPanel').contains(e.target) && e.target !== document.querySelector('.menu-btn')) {
    $('menuPanel').classList.remove('show');
  }
});

/* ---------- history view ---------- */
function openHistory() {
  $('menuPanel').classList.remove('show');
  view = 'history';
  $('boardBar').style.display = 'none';
  $('historyBar').style.display = 'block';
  render();
}
function closeHistory() {
  view = 'board';
  $('boardBar').style.display = 'flex';
  $('historyBar').style.display = 'none';
  render();
}
function setHistoryRange(r) {
  historyRange = r;
  historyDate = null;
  $('historyDate').value = '';
  document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.dataset.r === r));
  render();
}
function setHistoryDate(val) {
  if (!val) return;
  historyRange = 'custom';
  historyDate = val;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  render();
}

/* ---------- render ---------- */
function fmtTime(ts) {
  const d = new Date(ts);
  return d.toLocaleString([], { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
}
function fmtDateHeading(ts) {
  const d = new Date(ts);
  const today = new Date();
  const yest = new Date(today); yest.setDate(yest.getDate() - 1);
  const sameDay = (a, b) => a.toDateString() === b.toDateString();
  if (sameDay(d, today)) return 'Today';
  if (sameDay(d, yest)) return 'Yesterday';
  return d.toLocaleDateString([], { weekday: 'long', month: 'short', day: 'numeric' });
}
function esc(s) { return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }

function isUpcoming(o) { return o.order_for && new Date(o.order_for) > new Date(); }

function buildCard(o) {
  const card = document.createElement('div');
  card.className = 'card status-' + o.status;

  const badgeLabel = o.status === 'new' ? 'New' : o.status === 'in_progress' ? 'In Progress' : 'Done';
  let controls;
  if (o.status === 'new') {
    controls = `<div class="row">
      <button class="btn blue" onclick="setStatus('${o.id}','in_progress')">Start</button>
      <button class="btn red" onclick="del('${o.id}')">Delete</button>
    </div>`;
  } else if (o.status === 'in_progress') {
    controls = `<div class="row">
      <button class="btn green" onclick="setStatus('${o.id}','done')">Mark Done</button>
      <button class="btn red" onclick="del('${o.id}')">Delete</button>
    </div>`;
  } else {
    controls = `<div class="row">
      <button class="btn gray" onclick="setStatus('${o.id}','new')">Reopen</button>
      <button class="btn red" onclick="del('${o.id}')">Delete</button>
    </div>`;
  }

  const scheduledTag = o.order_for ? `<div class="upcoming-tag">For ${fmtTime(o.order_for)}</div>` : '';

  card.innerHTML = `
    <div class="top"><div class="name">${esc(o.customer_name)}</div><div class="time">${fmtTime(o.created_at)}</div></div>
    <span class="badge ${o.status}">${badgeLabel}</span>
    ${scheduledTag}
    <div class="items">${esc(o.items)}</div>
    ${o.notes ? `<div class="notes">${esc(o.notes)}</div>` : ''}
    ${controls}
  `;
  return card;
}

function inHistoryRange(ts) {
  const d = new Date(ts);
  const now = new Date();
  if (historyRange === 'custom' && historyDate) return d.toDateString() === new Date(historyDate + 'T00:00:00').toDateString();
  if (historyRange === 'today') return d.toDateString() === now.toDateString();
  if (historyRange === 'yesterday') {
    const yest = new Date(now); yest.setDate(yest.getDate() - 1);
    return d.toDateString() === yest.toDateString();
  }
  if (historyRange === '7days') {
    const cutoff = new Date(now); cutoff.setDate(cutoff.getDate() - 7);
    return d >= cutoff;
  }
  return true; // 'all'
}

function render() {
  const wrap = $('orders');
  let list;

  if (view === 'history') {
    list = orders.filter(o => inHistoryRange(o.created_at));
    if (search) list = list.filter(o => o.customer_name.toLowerCase().includes(search));
  } else if (filter === 'done') {
    list = orders.filter(o => o.status === 'done');
  } else if (filter === 'upcoming') {
    list = orders.filter(o => o.status !== 'done' && isUpcoming(o)).sort((a, b) => new Date(a.order_for) - new Date(b.order_for));
  } else {
    list = orders.filter(o => o.status !== 'done' && !isUpcoming(o));
  }

  $('empty').style.display = list.length ? 'none' : 'block';
  wrap.innerHTML = '';

  if (view === 'history') {
    if (!list.length) $('empty').innerHTML = 'No orders found for this range.';
    let lastHeading = null;
    list.forEach(o => {
      const heading = fmtDateHeading(o.created_at);
      if (heading !== lastHeading) {
        const h = document.createElement('div');
        h.className = 'date-heading';
        h.textContent = heading;
        wrap.appendChild(h);
        lastHeading = heading;
      }
      wrap.appendChild(buildCard(o));
    });
  } else if (filter === 'upcoming') {
    $('empty').innerHTML = 'No upcoming orders scheduled.';
    list.forEach(o => wrap.appendChild(buildCard(o)));
  } else {
    $('empty').innerHTML = 'No orders yet.<br>Tap <b>+ New Order</b> to add one.';
    list.forEach(o => wrap.appendChild(buildCard(o)));
  }
}

/* ---------- realtime ---------- */
function subscribeRealtime() {
  sb.channel('orders-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, loadOrders)
    .subscribe();
  sb.channel('menu-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'menu_items' }, loadMenu)
    .subscribe();
}

/* ---------- boot ---------- */
function boot() {
  loadOrders();
  loadMenu();
  subscribeRealtime();
  setInterval(render, 60000); // re-check upcoming vs active as time passes
}

if (sessionStorage.getItem('loggedIn') === '1') {
  $('gate').classList.remove('show');
  $('app').style.display = 'block';
  boot();
}
</script>
