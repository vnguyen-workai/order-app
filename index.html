<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Order Board</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
  :root {
    /* white main surfaces + navy chrome (header/side panels) + electric blue accent */
    --bg: #f3f5fa;
    --surface: #ffffff;
    --surface-2: #edf0f6;
    --line: #dde1ea;
    --ink: #161a25;
    --ink-dim: #667085;

    --chrome: #0f1c42;
    --chrome-2: #17285c;
    --chrome-line: rgba(255,255,255,.14);
    --ink-on-chrome: #eef1fb;
    --ink-on-chrome-dim: rgba(238,241,251,.64);

    --accent: #1868ff;
    --accent-ink: #ffffff;

    --amber: #b4650f;
    --amber-bg: #fbeedd;
    --green: #1f8a4c;
    --green-bg: #e5f6ec;
    --red: #d1453d;
    --red-bg: #fbe9e8;
    --radius: 12px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
  }
  header {
    position: sticky; top: 0; z-index: 5;
    background: var(--chrome);
    border-bottom: 1px solid var(--chrome-line);
    padding: 16px 20px;
    display: flex; align-items: center; justify-content: space-between;
  }
  header h1 {
    font-size: 19px; margin: 0; font-weight: 700; color: var(--ink-on-chrome);
  }
  header h1 .kicker {
    display: block; font-size: 13px; font-weight: 400;
    color: var(--ink-on-chrome-dim); margin-top: 2px;
  }
  .add-btn {
    background: var(--accent); color: var(--accent-ink);
    border: none; border-radius: var(--radius);
    font-size: 15px; font-weight: 700;
    padding: 12px 18px; cursor: pointer;
    transition: transform .1s ease;
  }
  .add-btn:active { transform: scale(.97); }

  .menu-btn {
    background: transparent; color: var(--ink-on-chrome); border: 1px solid var(--chrome-line);
    border-radius: var(--radius); font-size: 18px; line-height: 1;
    padding: 12px 15px; cursor: pointer; margin-right: 10px;
  }
  .menu-btn:active { transform: scale(.95); }

  .menu-panel {
    display: none; position: absolute; top: 64px; left: 20px; z-index: 8;
    background: var(--chrome-2); border: 1px solid var(--chrome-line); border-radius: var(--radius);
    padding: 4px; min-width: 190px;
  }
  .menu-panel.show { display: block; }
  .menu-panel button {
    display: block; width: 100%; text-align: left; background: transparent; border: none;
    color: var(--ink-on-chrome); font-size: 15px; font-weight: 600; padding: 12px 14px; border-radius: 8px; cursor: pointer;
  }
  .menu-panel button:active { background: var(--chrome); }

  .history-bar {
    display: flex; align-items: center; gap: 10px; padding: 14px 20px;
    background: var(--chrome);
  }
  .back-btn {
    background: transparent; border: 1px solid var(--chrome-line); color: var(--ink-on-chrome);
    border-radius: var(--radius); padding: 10px 14px; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .back-btn:active { transform: scale(.96); }
  .history-bar h2 { margin: 0; font-size: 16px; font-weight: 700; color: var(--ink-on-chrome); }

  .chip-row { display: flex; gap: 6px; padding: 14px 20px 0; flex-wrap: wrap; }
  .chip {
    background: var(--surface); color: var(--ink-dim); border: 1px solid var(--line);
    border-radius: 999px; padding: 8px 15px; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .chip.active { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }

  .date-wrap { padding: 12px 20px 0; }
  .date-wrap input[type=date] {
    width: 100%; font-size: 15px; padding: 11px 14px; border-radius: var(--radius);
    border: 1px solid var(--line); background: var(--surface); color: var(--ink); font-family: inherit;
  }
  .date-wrap input[type=date]:focus { outline: none; border-color: var(--accent); }

  .tabs { display: flex; gap: 6px; padding: 16px 20px 0; flex-wrap: wrap; }
  .tab {
    background: var(--surface); color: var(--ink-dim); border: 1px solid var(--line);
    border-radius: 999px;
    padding: 9px 18px; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .tab.active { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }

  .search-wrap { padding: 14px 20px 0; }
  .search-wrap input {
    width: 100%; font-size: 16px; padding: 12px 16px; border-radius: var(--radius);
    border: 1px solid var(--line); background: var(--surface); color: var(--ink);
    font-family: inherit;
  }
  .search-wrap input:focus { outline: none; border-color: var(--accent); }

  .date-heading {
    grid-column: 1 / -1;
    font-size: 13px; font-weight: 700;
    color: var(--ink-dim); padding: 10px 2px 0; margin-top: 6px;
    border-top: 1px solid var(--line);
  }
  .date-heading:first-child { border-top: none; margin-top: 0; padding-top: 0; }

  #orders {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px; padding: 20px;
  }
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 18px 18px 18px 20px;
    border: 1px solid var(--line);
    border-left: 3px solid var(--line);
    cursor: pointer;
    display: flex; flex-direction: column;
  }
  .card-footer { margin-top: auto; padding-top: 14px; }
  .card.status-new { border-left-color: var(--accent); }
  .card.status-in_progress { border-left-color: var(--amber); }
  .card.status-done { border-left-color: var(--green); opacity: .7; }

  .card .top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
  .card .name { font-size: 18px; font-weight: 700; word-break: break-word; }
  .pickup-block { text-align: right; white-space: nowrap; flex-shrink: 0; }
  .pickup-label { font-size: 11px; font-weight: 800; letter-spacing: .5px; color: var(--accent); text-transform: uppercase; }
  .pickup-time { font-size: 16px; font-weight: 800; color: var(--accent); }
  .pickup-relative { font-size: 12px; color: var(--ink-dim); }
  .created-line { font-size: 12px; color: var(--ink-dim); margin-top: 12px; }
  .card .items { font-size: 15px; color: var(--ink); margin: 0 0 4px; line-height: 1.6; padding: 0; list-style: none; }
  .card .items li { position: relative; padding-left: 16px; }
  .card .items li::before {
    content: ''; position: absolute; left: 0; top: 9px;
    width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
  }
  .more-items { font-size: 13px; font-weight: 700; color: var(--accent); margin-bottom: 10px; }
  .card .notes {
    font-size: 13px; color: var(--ink); margin-bottom: 14px; white-space: pre-wrap;
    background: var(--surface-2); border-left: 2px solid var(--amber); padding: 8px 10px;
  }
  .badge {
    display: inline-block;
    font-size: 12px; font-weight: 700;
    padding: 4px 10px; border-radius: 999px; margin-bottom: 12px;
  }
  .badge.new { background: rgba(24,104,255,.12); color: var(--accent); }
  .badge.in_progress { background: var(--amber-bg); color: var(--amber); }
  .badge.done { background: var(--green-bg); color: var(--green); }

  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn {
    border: none; border-radius: var(--radius); font-size: 14px; font-weight: 700;
    padding: 12px 14px; cursor: pointer; flex: 1; min-width: 90px; color: #fff;
    transition: transform .1s ease;
  }
  .btn:active { transform: scale(.97); }
  .btn.blue  { background: var(--accent); color: var(--accent-ink); }
  .btn.green { background: var(--green); color: #fff; }
  .btn.gray  { background: var(--surface-2); color: var(--ink); border: 1px solid var(--line); }
  .btn.red   { background: var(--red); }
  .btn-pill { border-radius: 999px; }
  .btn-solid-blue { background: var(--accent); color: var(--accent-ink); border: none; }
  .btn-solid-green { background: var(--green); color: #fff; border: none; }
  .btn-outline-red { background: var(--surface); color: var(--red); border: 1.5px solid var(--red); }
  .btn-outline-gray { background: var(--surface); color: var(--ink-dim); border: 1.5px solid var(--line); }

  .empty { text-align: center; color: var(--ink-dim); padding: 70px 20px; font-size: 16px; line-height: 1.6; }
  .empty b { color: var(--ink); }

  /* modal */
  .overlay {
    position: fixed; inset: 0; background: rgba(10,14,26,.55);
    display: none; align-items: center; justify-content: center; z-index: 20; padding: 16px;
  }
  .overlay.show { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 16px; padding: 24px; width: 100%; max-width: 420px; max-height: 92vh; overflow-y: auto;
  }
  .modal h2 { margin: 0 0 20px; font-size: 19px; font-weight: 700; text-align: center; color: var(--ink); }
  .modal label { font-size: 13px; color: var(--ink-dim); display: block; margin-bottom: 8px; font-weight: 600; }
  .modal input[type=text], .modal input[type=password], .modal textarea {
    width: 100%; font-size: 16px; padding: 13px 14px; border-radius: var(--radius);
    border: 1px solid var(--line);
    margin-bottom: 16px; background: var(--surface-2); color: var(--ink); font-family: inherit;
  }
  .modal input:focus, .modal textarea:focus { outline: none; border-color: var(--accent); }
  .modal textarea { min-height: 90px; resize: vertical; }
  .modal input[type=datetime-local] {
    width: 100%; font-size: 16px; padding: 13px 14px; border-radius: var(--radius);
    border: 1px solid var(--line); margin-bottom: 16px; background: var(--surface-2); color: var(--ink); font-family: inherit;
  }
  .checkbox-row {
    display: flex; align-items: center; gap: 10px; font-size: 14px; color: var(--ink);
    font-weight: 600; margin-bottom: 16px; cursor: pointer;
  }
  .checkbox-row input { width: 18px; height: 18px; margin: 0; }
  .modal .actions { display: flex; gap: 12px; margin-top: 6px; }
  .upcoming-tag {
    display: inline-block; font-size: 12px; font-weight: 700; color: var(--accent);
    background: rgba(24,104,255,.1); padding: 4px 10px; border-radius: 999px; margin-bottom: 12px;
  }
  .gate .modal { text-align: center; }
  .gate .modal h2 { color: var(--ink); }
  .err { color: var(--red); font-size: 14px; margin: -10px 0 14px; display: none; }

  /* ---------- New Order screen (menu + cart) ---------- */
  .order-screen {
    position: fixed; inset: 0; z-index: 12;
    background: var(--bg);
    display: flex; flex-direction: column;
  }
  .order-header {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 20px; background: var(--chrome);
    flex-shrink: 0;
  }
  .order-header h2 { margin: 0; font-size: 16px; font-weight: 700; color: var(--ink-on-chrome); }

  .order-body { flex: 1; min-height: 0; display: flex; overflow: hidden; }

  .menu-pane { flex: 1; overflow-y: auto; padding: 20px; background: var(--bg); }
  .menu-search { margin-bottom: 16px; }
  .menu-search input {
    width: 100%; font-size: 15px; padding: 13px 16px; border-radius: var(--radius);
    border: 1px solid var(--line); background: var(--surface); color: var(--ink); font-family: inherit;
  }
  .menu-search input:focus { outline: none; border-color: var(--accent); }
  .menu-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .menu-chips .chip.active { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
  .menu-category {
    font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: .5px;
    color: var(--ink-dim); margin: 24px 0 12px;
  }
  .menu-category:first-child { margin-top: 0; }
  .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
  .menu-item {
    position: relative; background: var(--surface); border: 1px solid var(--line);
    border-radius: 16px; padding: 22px 14px; color: var(--ink);
    font-size: 16px; font-weight: 700; text-align: center; cursor: pointer;
    box-shadow: 0 1px 2px rgba(16,26,64,.04);
    transition: transform .1s ease, border-color .1s ease, box-shadow .1s ease;
  }
  .menu-item:active { transform: scale(.97); }
  .menu-item:hover { border-color: var(--accent); box-shadow: 0 4px 12px rgba(24,104,255,.1); }
  .menu-item.picked { border-color: var(--accent); background: rgba(24,104,255,.06); }
  .menu-item .qty-badge {
    position: absolute; top: -10px; right: -10px;
    background: var(--accent); color: var(--accent-ink);
    font-size: 13px; font-weight: 800; min-width: 26px; height: 26px; border-radius: 999px;
    display: flex; align-items: center; justify-content: center; padding: 0 5px;
    box-shadow: 0 2px 6px rgba(24,104,255,.35);
  }

  .cart-pane {
    width: 320px; flex-shrink: 0;
    background: var(--bg);
    border-left: 1px solid var(--line);
    display: flex; flex-direction: column;
  }
  .cart-mobile-head { display: none; }
  .cart-scroll { flex: 1; min-height: 0; overflow-y: auto; padding: 18px 16px; display: flex; flex-direction: column; }
  .cart-title { font-size: 15px; font-weight: 700; color: var(--ink-dim); text-transform: uppercase; margin-bottom: 14px; }
  .cart-line {
    background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px;
    margin-bottom: 10px; font-size: 16px;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }
  .cart-line .cart-name { word-break: break-word; color: var(--ink); font-weight: 700; flex: 1; }
  .cart-qty-control { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .cart-qty-control button {
    width: 36px; height: 36px; flex-shrink: 0; border: none; border-radius: 8px;
    background: var(--accent); color: var(--accent-ink); font-size: 20px; font-weight: 800;
    cursor: pointer; line-height: 1;
  }
  .cart-qty-control button:active { transform: scale(.92); }
  .cart-qty-control .cart-qty { font-weight: 800; font-size: 20px; color: var(--ink); min-width: 22px; text-align: center; }
  .cart-empty { font-size: 14px; color: var(--ink-dim); line-height: 1.6; }
  .cart-summary {
    border-top: 1px solid var(--line); margin-top: 12px; padding-top: 14px;
    color: var(--ink); font-size: 16px;
  }
  .cart-summary .row-line { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .cart-summary .row-line.total { font-size: 20px; font-weight: 800; }
  .cart-summary .row-line.total span:last-child { color: var(--accent); }
  .custom-add { padding-top: 14px; display: flex; gap: 8px; }
  .custom-add input#customItemInput { flex: 1; }
  .custom-add input#customItemPrice { width: 80px; flex: none; }
  .cart-scroll input[type=text], .cart-scroll input[type=datetime-local], .cart-scroll textarea {
    width: 100%; font-size: 15px; padding: 11px 12px; border-radius: 8px;
    border: 1px solid var(--line); background: var(--surface); color: var(--ink); font-family: inherit;
  }
  .cart-scroll input[type=text]::placeholder, .cart-scroll textarea::placeholder { color: var(--ink-dim); }
  .cart-scroll input[type=text]:focus, .cart-scroll input[type=datetime-local]:focus, .cart-scroll textarea:focus { outline: none; border-color: var(--accent); }
  .custom-add .btn { flex: none; width: auto; padding: 11px 16px; font-size: 15px; }
  .custom-add .btn.gray { background: var(--accent); color: var(--accent-ink); border: none; }
  .cart-checkout { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--line); display: flex; flex-direction: column; gap: 12px; }
  .cart-checkout textarea { min-height: 60px; resize: vertical; }
  .cart-checkout label { font-size: 13px; color: var(--ink-dim); }
  .footer-toggles { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .footer-toggles .chip {
    background: var(--surface); color: var(--accent); border: 1px solid var(--accent);
    border-radius: 999px; padding: 8px 15px; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .footer-toggles .chip.on { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
  .footer-toggles .checkbox-row { color: var(--accent); }
  .cart-actions {
    flex-shrink: 0; display: flex; gap: 12px; padding: 14px 16px;
    border-top: 1px solid var(--line); background: var(--surface);
  }
  .cart-actions .btn.green { background: var(--accent); color: var(--accent-ink); }
  .cart-actions .btn.gray { background: var(--surface); color: var(--accent); border: 1px solid var(--accent); }

  .mobile-cart-bar { display: none; }

  /* ---------- phone layout ---------- */
  @media (max-width: 720px) {
    .cart-pane {
      position: fixed; inset: 0; z-index: 14; width: auto; border-left: none;
      transform: translateY(100%); transition: transform .25s ease;
    }
    .cart-pane.open { transform: translateY(0); }
    .cart-mobile-head {
      display: flex; align-items: center; gap: 12px; flex-shrink: 0;
      padding: 16px 16px; background: var(--chrome);
    }
    .cart-mobile-head span { color: var(--ink-on-chrome); font-weight: 700; font-size: 16px; }
    .mobile-cart-bar {
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0; padding: 16px 20px; background: var(--accent); color: var(--accent-ink);
      font-size: 16px; font-weight: 800; cursor: pointer;
    }
  }

  /* ---------- menu settings ---------- */
  .settings-body { flex: 1; min-height: 0; overflow-y: auto; padding: 16px 20px; background: var(--bg); }
  .settings-section {
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 14px 16px; margin-bottom: 14px;
  }
  .settings-section .section-head {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;
  }
  .settings-section .section-head h3 { margin: 0; font-size: 15px; font-weight: 700; color: var(--ink); }
  .settings-section .section-head button {
    background: transparent; border: none; color: var(--red); font-size: 13px; font-weight: 700; cursor: pointer; padding: 4px 6px;
  }
  .settings-item {
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    padding: 9px 0; border-top: 1px solid var(--line); font-size: 14px; color: var(--ink);
  }
  .settings-item:first-of-type { border-top: none; }
  .settings-item button {
    background: transparent; border: none; color: var(--red); font-size: 16px; font-weight: 800; cursor: pointer; padding: 2px 8px;
  }
  .settings-add-item { display: flex; gap: 8px; margin-top: 10px; }
  .settings-add-item input {
    flex: 1; font-size: 14px; padding: 9px 10px; border-radius: 8px;
    border: 1px solid var(--line); background: var(--surface-2); color: var(--ink); font-family: inherit;
  }
  .settings-add-item button {
    background: var(--accent); color: var(--accent-ink); border: none; border-radius: 8px;
    padding: 9px 14px; font-size: 13px; font-weight: 700; cursor: pointer;
  }
  .detail-name { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
  .detail-label {
    margin: 16px 0 4px; font-size: 12px; font-weight: 700; letter-spacing: .3px;
    text-transform: uppercase; color: var(--ink-dim);
  }
  .detail-items { white-space: pre-wrap; line-height: 1.6; font-size: 15px; }
  .detail-total { font-size: 26px; font-weight: 800; }
  .settings-item .sizes-tag {
    font-size: 12px; color: var(--ink-dim); margin-right: auto; margin-left: 10px;
  }
  .settings-item .sizes-btn {
    background: transparent; border: 1px solid var(--line); color: var(--accent);
    font-size: 12px; font-weight: 700; cursor: pointer; padding: 4px 8px; border-radius: 6px;
  }
  .price-wrap {
    display: flex; align-items: center; gap: 2px; font-size: 13px; color: var(--ink-dim); font-weight: 700;
  }
  .option-name-input {
    flex: 1; min-width: 0; font-size: 14px; padding: 8px 10px; border-radius: 8px;
    border: 1px solid var(--line); background: var(--surface-2); color: var(--ink); font-family: inherit;
  }
  .option-name-input:focus, .price-wrap input:focus { outline: none; border-color: var(--accent); }
  .price-wrap input {
    width: 56px; font-size: 13px; padding: 6px 6px; border-radius: 6px;
    border: 1px solid var(--line); background: var(--surface-2); color: var(--ink); font-family: inherit;
  }
  .menu-item .sizes-hint {
    display: block; font-size: 11px; color: var(--ink-dim); font-weight: 400; margin-top: 2px;
  }
  .size-options { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 18px; }
  .size-options button {
    flex: 1; min-width: 70px; border: 1px solid var(--line); background: var(--surface-2);
    color: var(--ink); border-radius: var(--radius); padding: 16px 10px;
    font-size: 15px; font-weight: 700; cursor: pointer;
  }
  .size-options button:active { transform: scale(.96); background: rgba(24,104,255,.1); border-color: var(--accent); }
</style>
</head>
<body>

<!-- Password gate -->
<div class="overlay gate show" id="gate">
  <div class="modal">
    <h2>Staff Login</h2>
    <input type="password" id="pw" placeholder="Enter shared password" autocomplete="off">
    <div class="err" id="pwErr">Wrong password, try again.</div>
    <button class="btn green" style="width:100%" onclick="tryLogin()">Enter</button>
  </div>
</div>

<div id="app" style="display:none">
  <header>
    <div style="display:flex; align-items:center;">
      <button class="menu-btn" onclick="toggleMenu()">☰</button>
      <h1>Order Board<span class="kicker">Viet-Cajun Kitchen</span></h1>
    </div>
    <button class="add-btn" onclick="openOrderScreen()">+ New Order</button>
  </header>

  <div class="menu-panel" id="menuPanel">
    <button onclick="openHistory()">Order History</button>

<script>
/* ================== CONFIG — fill these in from your Supabase project ================== */
const SUPABASE_URL = 'https://cfoqlxzhtfyahhszcinl.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_mONNhGPjavlxtacViUR0PQ_t1IYJyg3';
const SHARED_PASSWORD = '1234'; // set your staff password here
const SETTINGS_PIN = '9999'; // separate PIN to edit the menu (keep employees from changing it by accident)
/* ========================================================================================= */

const $ = id => document.getElementById(id);
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let orders = [];
let filter = 'active';
let search = '';
let view = 'board';         // 'board' | 'history'
let historyRange = 'today'; // 'today' | 'yesterday' | '7days' | 'all' | 'custom'
let historyDate = null;     // 'YYYY-MM-DD' when historyRange === 'custom'

/* ---------- login gate ---------- */
function tryLogin() {
  if ($('pw').value === SHARED_PASSWORD) {
    sessionStorage.setItem('loggedIn', '1');
    $('gate').classList.remove('show');
    $('app').style.display = 'block';
    boot();
  } else {
    $('pwErr').style.display = 'block';
  }
}
$('pw').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

/* ---------- data ---------- */
async function loadOrders() {
  const { data, error } = await sb.from('orders').select('*').order('created_at', { ascending: false });
  if (error) { console.error(error); return; }
  orders = data;
  render();
}

async function addOrder() {
  const customer_name = $('custName').value.trim() || 'Customer';
  const items = cartToItemsString();
  const notes = $('custNotes').value.trim();
  if (!items) { alert('Tap at least one menu item, or add a custom one.'); return; }
  let order_for = null;
  if ($('scheduleToggle').checked) {
    const when = $('custWhen').value;
    if (!when) { alert('Pick a date and time for this order, or uncheck "Schedule for later."'); return; }
    order_for = new Date(when).toISOString();
  }
  const total = cartTotalMoney();
  const { error } = await sb.from('orders').insert([{ customer_name, items, notes, status: 'new', order_for, total }]);
  if (error) { alert('Could not save order: ' + error.message); return; }
  closeOrderScreen();
}

async function setStatus(id, status) {
  const { error } = await sb.from('orders').update({ status }).eq('id', id);
  if (error) alert('Could not update order: ' + error.message);
}

async function del(id) {
  if (!confirm('Delete this order?')) return;
  const { error } = await sb.from('orders').delete().eq('id', id);
  if (error) alert('Could not delete order: ' + error.message);
}

/* ---------- schedule toggle ---------- */
function onScheduleToggle() {
  $('scheduleField').style.display = $('scheduleToggle').checked ? 'block' : 'none';
}

/* ---------- food menu + cart ---------- */
let menuItems = []; // raw rows from Supabase: {id, category, name, sort_order}
let cart = {}; // { itemName: qty }

async function loadMenu() {
  const { data, error } = await sb.from('menu_items').select('*').order('category').order('sort_order');
  if (error) { console.error(error); return; }
  menuItems = data;
}

function menuByCategory() {
  const map = new Map();
  menuItems.forEach(it => {
    if (!map.has(it.category)) map.set(it.category, []);
    map.get(it.category).push(it);
  });
  return map;
}

let menuSearchTerm = '';
let menuActiveCategory = 'all';

function openOrderScreen() {
  cart = {};
  customPrices = {};
  $('custName').value = ''; $('custNotes').value = ''; $('customItemInput').value = ''; $('customItemPrice').value = '';
  $('scheduleToggle').checked = false; $('custWhen').value = ''; $('scheduleField').style.display = 'none';
  $('menuSearch').value = ''; menuSearchTerm = ''; menuActiveCategory = 'all';
  $('noteField').style.display = 'none';
  $('noteToggleBtn').classList.remove('on');
  $('noteToggleBtn').textContent = '+ Add Note';
  $('cartPane').classList.remove('open');
  renderMenuChips();
  renderMenuPane();
  renderCart();
  $('orderScreen').style.display = 'flex';
}
function closeOrderScreen() { $('orderScreen').style.display = 'none'; }

function onMenuSearch() {
  menuSearchTerm = $('menuSearch').value.trim().toLowerCase();
  renderMenuPane();
}
function setMenuCategory(cat) {
  menuActiveCategory = cat;
  renderMenuChips();
  renderMenuPane();
}
function toggleNoteField() {
  const open = $('noteField').style.display === 'none';
  $('noteField').style.display = open ? 'block' : 'none';
  $('noteToggleBtn').classList.toggle('on', open);
  $('noteToggleBtn').textContent = open ? 'Note ✓' : '+ Add Note';
  if (open) $('custNotes').focus();
}

function renderMenuChips() {
  const wrap = $('menuChips');
  wrap.innerHTML = '';
  const cats = ['all', ...menuByCategory().keys()];
  cats.forEach(cat => {
    const chip = document.createElement('button');
    chip.className = 'chip' + (menuActiveCategory === cat ? ' active' : '');
    chip.textContent = cat === 'all' ? 'All' : cat;
    chip.onclick = () => setMenuCategory(cat);
    wrap.appendChild(chip);
  });
}

function renderMenuPane() {
  const list = $('menuList');
  list.innerHTML = '';
  if (!menuItems.length) { list.innerHTML = '<div class="empty">No menu items yet. Add some in Menu Settings.</div>'; return; }
  let anyShown = false;
  menuByCategory().forEach((items, category) => {
    if (menuActiveCategory !== 'all' && menuActiveCategory !== category) return;
    const shownItems = items.filter(it => !menuSearchTerm || it.name.toLowerCase().includes(menuSearchTerm));
    if (!shownItems.length) return;
    anyShown = true;

    const heading = document.createElement('div');
    heading.className = 'menu-category';
    heading.textContent = category;
    list.appendChild(heading);

    const grid = document.createElement('div');
    grid.className = 'menu-grid';
    shownItems.forEach(it => {
      const btn = document.createElement('button');
      btn.className = 'menu-item';
      btn.dataset.name = it.name;
      const optionList = parseOptions(it.sizes);
      if (optionList.length) {
        btn.onclick = () => openOptionPicker(it.name, optionList);
      } else {
        btn.onclick = () => addToCart(it.name);
      }
      btn.innerHTML = esc(it.name);
      grid.appendChild(btn);
    });
    list.appendChild(grid);
  });
  if (!anyShown) list.innerHTML = '<div class="empty">No items match your search.</div>';
  updateMenuBadges();
}

function addToCart(name) {
  cart[name] = (cart[name] || 0) + 1;
  renderCart();
  updateMenuBadges();
}
function decrementCart(name) {
  if (!cart[name]) return;
  cart[name] -= 1;
  if (cart[name] <= 0) delete cart[name];
  renderCart();
  updateMenuBadges();
}
let customPrices = {}; // { itemName: price } for "Other item" entries this order

function addCustomItem() {
  const name = $('customItemInput').value.trim();
  if (!name) return;
  const priceRaw = $('customItemPrice').value.trim();
  customPrices[name] = (priceRaw === '' || isNaN(Number(priceRaw))) ? 0 : Number(priceRaw);
  addToCart(name);
  $('customItemInput').value = '';
  $('customItemPrice').value = '';
}

function parseOptions(options) {
  return (options || '').split(',').map(s => s.trim()).filter(Boolean).map(entry => {
    const idx = entry.lastIndexOf(':');
    if (idx === -1) return { name: entry, price: null };
    const name = entry.slice(0, idx).trim();
    const price = Number(entry.slice(idx + 1).trim());
    return { name, price: isNaN(price) ? null : price };
  });
}
function serializeOptions(optionObjs) {
  return optionObjs.map(o => `${o.name}:${o.price != null ? o.price : ''}`).join(',');
}
function cartQtyForItem(name) {
  return Object.keys(cart).reduce((sum, key) => {
    if (key === name || key.startsWith(name + ' (')) return sum + cart[key];
    return sum;
  }, 0);
}

let optionPickerName = null;
function openOptionPicker(name, optionList) {
  optionPickerName = name;
  $('optionPickerTitle').textContent = name;
  const body = $('optionPickerBody');
  body.innerHTML = '';
  const grid = document.createElement('div');
  grid.className = 'menu-grid';
  optionList.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'menu-item';
    btn.style.padding = '22px 10px';
    btn.style.fontSize = '17px';
    btn.innerHTML = `${esc(opt.name)}${opt.price != null ? `<span class="sizes-hint">$${opt.price.toFixed(2)}</span>` : ''}`;
    btn.onclick = () => { addToCart(`${optionPickerName} (${opt.name})`); closeOptionPicker(); };
    grid.appendChild(btn);
  });
  body.appendChild(grid);
  $('optionPickerScreen').style.display = 'flex';
}
function closeOptionPicker() { $('optionPickerScreen').style.display = 'none'; }

function updateMenuBadges() {
  $('menuPane').querySelectorAll('.menu-item').forEach(btn => {
    const qty = cartQtyForItem(btn.dataset.name);
    btn.classList.toggle('picked', qty > 0);
    const existing = btn.querySelector('.qty-badge');
    if (qty > 0) {
      if (existing) existing.textContent = qty;
      else {
        const b = document.createElement('span');
        b.className = 'qty-badge';
        b.textContent = qty;
        btn.appendChild(b);
      }
    } else if (existing) existing.remove();
  });
}

function basePriceForCartKey(key) {
  const m = key.match(/^(.*) \(([^)]+)\)$/);
  if (m) {
    const [, baseName, optionName] = m;
    const item = menuItems.find(mi => mi.name === baseName);
    if (!item) return 0;
    const opt = parseOptions(item.sizes).find(o => o.name === optionName);
    if (opt && opt.price != null) return opt.price;
    return item.price != null ? Number(item.price) : 0;
  }
  const item = menuItems.find(mi => mi.name === key);
  if (item) return item.price != null ? Number(item.price) : 0;
  return customPrices[key] != null ? customPrices[key] : 0;
}

function cartTotalQty() {
  return Object.keys(cart).reduce((sum, name) => sum + cart[name], 0);
}
function cartTotalMoney() {
  return Object.keys(cart).reduce((sum, name) => sum + cart[name] * basePriceForCartKey(name), 0);
}

function renderCart() {
  const list = $('cartList');
  const names = Object.keys(cart);
  $('cartEmpty').style.display = names.length ? 'none' : 'block';
  list.innerHTML = '';
  names.forEach(name => {
    const line = document.createElement('div');
    line.className = 'cart-line';
    line.innerHTML = `
      <span class="cart-name">${esc(name)}</span>
      <div class="cart-qty-control">
        <button class="dec">−</button>
        <span class="cart-qty">${cart[name]}</span>
        <button class="inc">+</button>
      </div>
    `;
    line.querySelector('.dec').onclick = () => decrementCart(name);
    line.querySelector('.inc').onclick = () => addToCart(name);
    list.appendChild(line);
  });
  const totalQty = cartTotalQty(), totalMoney = cartTotalMoney();

  const summary = $('cartSummary');
  if (names.length) {
    summary.style.display = 'block';
    summary.innerHTML = `
      <div class="row-line"><span>Items</span><span>${totalQty}</span></div>
      <div class="row-line total"><span>Total</span><span>$${totalMoney.toFixed(2)}</span></div>
    `;
  } else {
    summary.style.display = 'none';
  }

  const bar = $('mobileCartBar');
  $('mobileCartInfo').textContent = `${totalQty} item${totalQty === 1 ? '' : 's'} · $${totalMoney.toFixed(2)}`;
  bar.style.display = names.length ? '' : 'none';
}

function openMobileCart() { $('cartPane').classList.add('open'); }
function closeMobileCart() { $('cartPane').classList.remove('open'); }

function cartToItemsString() {
  return Object.keys(cart).map(name => `${cart[name]}x ${name}`).join('\n');
}

/* ---------- menu settings ---------- */
async function openMenuSettings() {
  $('menuPanel').classList.remove('show');
  const pin = prompt('Enter the Menu Settings PIN:');
  if (pin === null) return;
  if (pin !== SETTINGS_PIN) { alert('Wrong PIN.'); return; }
  await loadMenu();
  renderSettingsBody();
  $('newSectionInput').value = ''; $('newSectionFirstItem').value = '';
  $('settingsScreen').style.display = 'flex';
}
function closeMenuSettings() { $('settingsScreen').style.display = 'none'; }

function renderSettingsBody() {
  const body = $('settingsBody');
  body.innerHTML = '';
  if (!menuItems.length) {
    body.innerHTML = '<div class="empty">No sections yet. Add one below.</div>';
    return;
  }
  menuByCategory().forEach((items, category) => {
    const section = document.createElement('div');
    section.className = 'settings-section';

    const head = document.createElement('div');
    head.className = 'section-head';
    head.innerHTML = `<h3>${esc(category)}</h3>`;
    const delSectionBtn = document.createElement('button');
    delSectionBtn.textContent = 'Delete section';
    delSectionBtn.onclick = () => deleteSection(category);
    head.appendChild(delSectionBtn);
    section.appendChild(head);

    items.forEach(it => {
      const row = document.createElement('div');
      row.className = 'settings-item';
      const optionList = parseOptions(it.sizes);
      row.innerHTML = `<span>${esc(it.name)}</span>`;
      const rightGroup = document.createElement('div');
      rightGroup.style.cssText = 'display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end;';

      if (!optionList.length) {
        const priceWrap = document.createElement('div');
        priceWrap.className = 'price-wrap';
        const priceInput = document.createElement('input');
        priceInput.type = 'number'; priceInput.step = '0.01'; priceInput.min = '0';
        priceInput.placeholder = '0.00';
        priceInput.value = (it.price === null || it.price === undefined) ? '' : it.price;
        priceInput.onchange = () => updateMenuItemPrice(it.id, priceInput.value);
        priceWrap.innerHTML = '$';
        priceWrap.appendChild(priceInput);
        rightGroup.appendChild(priceWrap);
      }

      const optionsBtn = document.createElement('button');
      optionsBtn.className = 'sizes-btn';
      optionsBtn.textContent = optionList.length
        ? `Options: ${optionList.map(o => `${o.name} $${o.price != null ? o.price : '?'}`).join(', ')}`
        : '+ Options';
      optionsBtn.onclick = () => openOptionsEdit(it.id, it.name, it.sizes);
      rightGroup.appendChild(optionsBtn);
      const delBtn = document.createElement('button');
      delBtn.textContent = '×';
      delBtn.onclick = () => deleteMenuItem(it.id);
      rightGroup.appendChild(delBtn);
      row.appendChild(rightGroup);
      section.appendChild(row);
    });

    const addRow = document.createElement('div');
    addRow.className = 'settings-add-item';
    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = 'New item name';
    const addBtn = document.createElement('button');
    addBtn.textContent = 'Add';
    addBtn.onclick = () => addMenuItem(category, input.value, items.length);
    addRow.appendChild(input); addRow.appendChild(addBtn);
    section.appendChild(addRow);

    body.appendChild(section);
  });
}

async function addMenuItem(category, name, sortOrder) {
  name = name.trim();
  if (!name) return;
  const { error } = await sb.from('menu_items').insert([{ category, name, sort_order: sortOrder }]);
  if (error) { alert('Could not add item: ' + error.message); return; }
  await loadMenu();
  renderSettingsBody();
}

async function updateMenuItemPrice(id, value) {
  const price = value === '' ? null : Number(value);
  const { error } = await sb.from('menu_items').update({ price }).eq('id', id);
  if (error) { alert('Could not update price: ' + error.message); return; }
  await loadMenu();
}

async function deleteMenuItem(id) {
  if (!confirm('Delete this item?')) return;
  const { error } = await sb.from('menu_items').delete().eq('id', id);
  if (error) { alert('Could not delete item: ' + error.message); return; }
  await loadMenu();
  renderSettingsBody();
}

let editingItemId = null;
let editingItemOptions = [];

function openOptionsEdit(id, name, current) {
  editingItemId = id;
  editingItemOptions = parseOptions(current);
  $('optionsEditTitle').textContent = `${name} — Options`;
  $('newOptionInput').value = '';
  $('newOptionPrice').value = '';
  renderOptionsEditBody();
  $('optionsEditScreen').style.display = 'flex';
}
function closeOptionsEdit() {
  $('optionsEditScreen').style.display = 'none';
  renderSettingsBody();
}
function renderOptionsEditBody() {
  const body = $('optionsEditBody');
  body.innerHTML = '';
  if (!editingItemOptions.length) {
    body.innerHTML = '<div class="empty">No options yet. This item will be added straight to the cart with a single tap.<br><br>Add options below (e.g. Small $2, Medium $3, Large $4) to make it show a choice screen with its own price per option instead.</div>';
    return;
  }
  const section = document.createElement('div');
  section.className = 'settings-section';
  editingItemOptions.forEach((opt, i) => {
    const row = document.createElement('div');
    row.className = 'settings-item';

    const nameInput = document.createElement('input');
    nameInput.type = 'text'; nameInput.className = 'option-name-input';
    nameInput.value = opt.name;
    nameInput.onchange = () => editOptionField(i, 'name', nameInput.value);

    const priceWrap = document.createElement('div');
    priceWrap.className = 'price-wrap';
    const priceInput = document.createElement('input');
    priceInput.type = 'number'; priceInput.step = '0.01'; priceInput.min = '0';
    priceInput.value = opt.price != null ? opt.price : 0;
    priceInput.onchange = () => editOptionField(i, 'price', priceInput.value);
    priceWrap.innerHTML = '$';
    priceWrap.appendChild(priceInput);

    const delBtn = document.createElement('button');
    delBtn.textContent = '×';
    delBtn.onclick = () => removeOptionFromItem(i);

    row.appendChild(nameInput);
    row.appendChild(priceWrap);
    row.appendChild(delBtn);
    section.appendChild(row);
  });
  body.appendChild(section);
}
async function saveItemOptions() {
  const cleaned = serializeOptions(editingItemOptions);
  const { error } = await sb.from('menu_items').update({ sizes: cleaned || null }).eq('id', editingItemId);
  if (error) { alert('Could not save options: ' + error.message); return; }
  await loadMenu();
}
async function addOptionToItem() {
  const name = $('newOptionInput').value.trim();
  const priceRaw = $('newOptionPrice').value.trim();
  if (!name) return;
  const price = (priceRaw === '' || isNaN(Number(priceRaw))) ? 0 : Number(priceRaw);
  editingItemOptions.push({ name, price });
  $('newOptionInput').value = '';
  $('newOptionPrice').value = '';
  renderOptionsEditBody();
  await saveItemOptions();
}
async function removeOptionFromItem(index) {
  editingItemOptions.splice(index, 1);
  renderOptionsEditBody();
  await saveItemOptions();
}

async function editOptionField(index, field, value) {
  if (field === 'name') {
    const name = value.trim();
    if (!name) { renderOptionsEditBody(); return; }
    editingItemOptions[index].name = name;
  } else {
    const price = (value.trim() === '' || isNaN(Number(value))) ? 0 : Number(value);
    editingItemOptions[index].price = price;
  }
  await saveItemOptions();
}

async function deleteSection(category) {
  if (!confirm(`Delete the whole "${category}" section and all its items?`)) return;
  const { error } = await sb.from('menu_items').delete().eq('category', category);
  if (error) { alert('Could not delete section: ' + error.message); return; }
  await loadMenu();
  renderSettingsBody();
}

async function addSection() {
  const category = $('newSectionInput').value.trim();
  const firstItem = $('newSectionFirstItem').value.trim();
  if (!category || !firstItem) { alert('Enter both a section name and its first item.'); return; }
  const { error } = await sb.from('menu_items').insert([{ category, name: firstItem, sort_order: 0 }]);
  if (error) { alert('Could not add section: ' + error.message); return; }
  $('newSectionInput').value = ''; $('newSectionFirstItem').value = '';
  await loadMenu();
  renderSettingsBody();
}

/* ---------- filter (board tabs) ---------- */
function setFilter(f) {
  filter = f;
  document.querySelectorAll('#boardBar .tab').forEach(t => t.classList.toggle('active', t.dataset.f === f));
  render();
}
function onSearch() {
  search = $('searchBox').value.trim().toLowerCase();
  render();
}

/* ---------- menu ---------- */
function toggleMenu() { $('menuPanel').classList.toggle('show'); }
document.addEventListener('click', e => {
  if (!$('menuPanel').contains(e.target) && e.target !== document.querySelector('.menu-btn')) {
    $('menuPanel').classList.remove('show');
  }
});

/* ---------- history view ---------- */
function openHistory() {
  $('menuPanel').classList.remove('show');
  view = 'history';
  $('boardBar').style.display = 'none';
  $('historyBar').style.display = 'block';
  render();
}
function closeHistory() {
  view = 'board';
  $('boardBar').style.display = 'flex';
  $('historyBar').style.display = 'none';
  render();
}
function setHistoryRange(r) {
  historyRange = r;
  historyDate = null;
  $('historyDate').value = '';
  document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.dataset.r === r));
  render();
}
function setHistoryDate(val) {
  if (!val) return;
  historyRange = 'custom';
  historyDate = val;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  render();
}

/* ---------- render ---------- */
function fmtTime(ts) {
  const d = new Date(ts);
  return d.toLocaleString([], { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
}
function fmtTimeParts(ts) {
  const d = new Date(ts);
  return {
    time: d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }),
    date: d.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' })
  };
}
function relativeDayLabel(ts) {
  const d = new Date(ts);
  const today = new Date();
  const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate() + 1);
  const sameDay = (a, b) => a.toDateString() === b.toDateString();
  if (sameDay(d, today)) return 'Today';
  if (sameDay(d, tomorrow)) return 'Tomorrow';
  return d.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
}
function fmtDateHeading(ts) {
  const d = new Date(ts);
  const today = new Date();
  const yest = new Date(today); yest.setDate(yest.getDate() - 1);
  const sameDay = (a, b) => a.toDateString() === b.toDateString();
  if (sameDay(d, today)) return 'Today';
  if (sameDay(d, yest)) return 'Yesterday';
  return d.toLocaleDateString([], { weekday: 'long', month: 'short', day: 'numeric' });
}
function esc(s) { return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }

function isUpcoming(o) {
  if (!o.order_for) return false;
  const orderDate = new Date(o.order_for);
  const today = new Date();
  return orderDate.toDateString() !== today.toDateString() && orderDate > today;
}

function buildCard(o) {
  const card = document.createElement('div');
  card.className = 'card status-' + o.status;

  const badgeLabel = o.status === 'new' ? 'Pending' : o.status === 'in_progress' ? 'In Progress' : 'Done';
  let controls;
  if (o.status === 'new') {
    controls = `<div class="row">
      <button class="btn btn-pill btn-solid-blue" onclick="setStatus('${o.id}','in_progress')">▶ Start</button>
      <button class="btn btn-pill btn-outline-red" onclick="del('${o.id}')">Delete</button>
    </div>`;
  } else if (o.status === 'in_progress') {
    controls = `<div class="row">
      <button class="btn btn-pill btn-solid-green" onclick="setStatus('${o.id}','done')">✓ Mark Done</button>
      <button class="btn btn-pill btn-outline-red" onclick="del('${o.id}')">Delete</button>
    </div>`;
  } else {
    controls = `<div class="row">
      <button class="btn btn-pill btn-outline-gray" onclick="setStatus('${o.id}','new')">↺ Reopen</button>
      <button class="btn btn-pill btn-outline-red" onclick="del('${o.id}')">Delete</button>
    </div>`;
  }

  const pickupBlock = o.order_for ? `
    <div class="pickup-block">
      <div class="pickup-label">Pickup</div>
      <div class="pickup-time">${fmtTime(o.order_for)}</div>
      <div class="pickup-relative">(${relativeDayLabel(o.order_for)})</div>
    </div>` : '';

  const MAX_ITEMS = 5;
  const itemLines = o.items.split('\n').filter(Boolean);
  const shownLines = itemLines.slice(0, MAX_ITEMS);
  const extraCount = itemLines.length - shownLines.length;
  const itemsHtml = shownLines.map(line => `<li>${esc(line)}</li>`).join('');
  const moreLine = extraCount > 0 ? `<div class="more-items">+${extraCount} more item${extraCount === 1 ? '' : 's'}</div>` : '';

  const { time: createdTime, date: createdDate } = fmtTimeParts(o.created_at);

  card.innerHTML = `
    <div class="top">
      <div class="name">${esc(o.customer_name)}</div>
      ${pickupBlock}
    </div>
    <span class="badge ${o.status}">${badgeLabel}</span>
    <ul class="items">${itemsHtml}</ul>
    ${moreLine}
    ${o.notes ? `<div class="notes">${esc(o.notes)}</div>` : ''}
    <div class="card-footer">
      ${controls}
      <div class="created-line">Created ${createdTime} • ${createdDate}</div>
    </div>
  `;
  card.onclick = (e) => { if (e.target.closest('button')) return; openOrderDetail(o.id); };
  return card;
}

let detailOrderId = null;
function openOrderDetail(id) {
  const o = orders.find(x => x.id === id);
  if (!o) return;
  detailOrderId = id;
  renderOrderDetail(o);
  $('orderDetailScreen').style.display = 'flex';
}
function closeOrderDetail() { $('orderDetailScreen').style.display = 'none'; }

function renderOrderDetail(o) {
  const badgeLabel = o.status === 'new' ? 'Pending' : o.status === 'in_progress' ? 'In Progress' : 'Done';
  const body = $('orderDetailBody');
  body.innerHTML = `
    <div class="settings-section">
      <div class="detail-name">${esc(o.customer_name)}</div>
      <span class="badge ${o.status}">${badgeLabel}</span>
      ${o.order_for ? `<div class="upcoming-tag">For ${fmtTime(o.order_for)}</div>` : ''}

      <div class="detail-label">Placed</div>
      <div>${fmtTime(o.created_at)}</div>

      <div class="detail-label">Items</div>
      <div class="detail-items">${esc(o.items)}</div>

      ${o.notes ? `<div class="detail-label">Notes</div><div class="notes" style="margin-bottom:0;">${esc(o.notes)}</div>` : ''}

      <div class="detail-label">Total</div>
      <div class="detail-total">${o.total != null ? '$' + Number(o.total).toFixed(2) : 'Not recorded'}</div>
    </div>
  `;
}

function inHistoryRange(ts) {
  const d = new Date(ts);
  const now = new Date();
  if (historyRange === 'custom' && historyDate) return d.toDateString() === new Date(historyDate + 'T00:00:00').toDateString();
  if (historyRange === 'today') return d.toDateString() === now.toDateString();
  if (historyRange === 'yesterday') {
    const yest = new Date(now); yest.setDate(yest.getDate() - 1);
    return d.toDateString() === yest.toDateString();
  }
  if (historyRange === '7days') {
    const cutoff = new Date(now); cutoff.setDate(cutoff.getDate() - 7);
    return d >= cutoff;
  }
  return true; // 'all'
}

function render() {
  const wrap = $('orders');
  let list;

  if (view === 'history') {
    list = orders.filter(o => o.status === 'done' && inHistoryRange(o.created_at));
    if (search) list = list.filter(o => o.customer_name.toLowerCase().includes(search));
  } else if (filter === 'done') {
    list = orders.filter(o => o.status === 'done');
  } else if (filter === 'upcoming') {
    list = orders.filter(o => o.status !== 'done' && isUpcoming(o)).sort((a, b) => new Date(a.order_for) - new Date(b.order_for));
  } else {
    list = orders.filter(o => o.status !== 'done' && !isUpcoming(o));
  }

  $('empty').style.display = list.length ? 'none' : 'block';
  wrap.innerHTML = '';

  if (view === 'history') {
    if (!list.length) $('empty').innerHTML = 'No orders found for this range.';
    let lastHeading = null;
    list.forEach(o => {
      const heading = fmtDateHeading(o.created_at);
      if (heading !== lastHeading) {
        const h = document.createElement('div');
        h.className = 'date-heading';
        h.textContent = heading;
        wrap.appendChild(h);
        lastHeading = heading;
      }
      wrap.appendChild(buildCard(o));
    });
  } else if (filter === 'upcoming') {
    $('empty').innerHTML = 'No upcoming orders scheduled.';
    list.forEach(o => wrap.appendChild(buildCard(o)));
  } else {
    $('empty').innerHTML = 'No orders yet.<br>Tap <b>+ New Order</b> to add one.';
    list.forEach(o => wrap.appendChild(buildCard(o)));
  }
}

/* ---------- realtime ---------- */
function subscribeRealtime() {
  sb.channel('orders-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, loadOrders)
    .subscribe();
  sb.channel('menu-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'menu_items' }, loadMenu)
    .subscribe();
}

/* ---------- boot ---------- */
function boot() {
  loadOrders();
  loadMenu();
  subscribeRealtime();
  setInterval(render, 60000); // re-check upcoming vs active as time passes
}

if (sessionStorage.getItem('loggedIn') === '1') {
  $('gate').classList.remove('show');
  $('app').style.display = 'block';
  boot();
}
</script>
